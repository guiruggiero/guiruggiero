name: Update top languages card

permissions:
  contents: write

on:
  schedule:
    - cron: "0 12 1 * *" # Runs monthly at 12pm UTC (5am PDT)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Generate card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=guiruggiero&layout=compact&langs_count=6
          path: top-langs.svg
          token: ${{ secrets.PAT }}

      - name: Commit card
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add top-langs.svg
          git commit -m "Updated top languages card" || exit 0
          git pull --rebase
          git push
